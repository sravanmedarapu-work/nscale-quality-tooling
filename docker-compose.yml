services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_history
      POSTGRES_PASSWORD: test_history
      POSTGRES_DB: test_history
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_history"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
